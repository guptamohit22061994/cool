<html lang="en"><head>

   
 
  
  
    <title> Modal Popup after Time Delay</title>
    
    
    <link rel="stylesheet" href="https://cdn.rawgit.com/jackmoore/colorbox/master/example1/colorbox.css">

    <script>
    if (document.location.search.match(/type=embed/gi)) {
      window.parent.postMessage("resize", "*");
    }
  </script>
  
  
  </head>
  
  <body>
   
  
  <div id="modal-content" style="display: none;">
   <img src="ganesh.jpg" alt="">
  </div>
      <script src="https://cpwebassets.codepen.io/assets/common/stopExecutionOnTimeout-1b93190375e9ccc259df3a57c1abc0e64599724ae30d7ea4c6877eb615f89387.js"></script>
  
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
  <script src="https://cdn.rawgit.com/jackmoore/colorbox/master/jquery.colorbox-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/2.1.3/js.cookie.min.js"></script>
        <script id="rendered-js">
  $(".clear-cookie").on("click", function () {
    Cookies.remove('colorboxShown');
    $(this).replaceWith("<p><em>Cookie cleared. Re-run demo</em></p>");
  });
  
  $(".order-cheezburger").on("click", function () {
    $.colorbox.close();
  });
  
  function onPopupOpen() {
    $("#modal-content").show();
    $("#yurEmail").focus();
  }
  
  function onPopupClose() {
    $("#modal-content").hide();
    Cookies.set('colorboxShown', 'yes', {
      expires: 1 });
  
    $(".clear-cookie").fadeIn();
    lastFocus.focus();
  }
  
  function displayPopup() {
    $.colorbox({
      inline: true,
      href: "#modal-content",
      className: "cta",
      width: 600,
      height: 350,
      onComplete: onPopupOpen,
      onClosed: onPopupClose });
  
  }
  
  var lastFocus;
  var popupShown = Cookies.get('colorboxShown');
  
  if (popupShown) {
    console.log("Cookie found. No action necessary");
    $(".clear-cookie").show();
  } else {
    console.log("No cookie found. Opening popup in 3 seconds");
    $(".clear-cookie").hide();
    setTimeout(function () {
      lastFocus = document.activeElement;
      displayPopup();
    }, 3000);
  }
  
      </script>
  
    
  
   
  <div id="cboxOverlay" class="cta" style="opacity: 0; cursor: pointer; visibility: visible; display: none;"></div>
  <div id="colorbox" class="cta" role="dialog" tabindex="-1" style="display: none; visibility: visible; top: 120px; left: 659px; position: absolute; width: 600px; height: 350px; opacity: 0;">
    <div id="cboxWrapper" style="height: 350px; width: 600px;"><div>
        <div id="cboxTopLeft" style="float: left;"></div>
        <div id="cboxTopCenter" style="float: left; width: 558px;"></div>
        <div id="cboxTopRight" style="float: left;"></div></div>
        <div style="clear: left;"><div id="cboxMiddleLeft" style="float: left; height: 308px;"></div>
        <div id="cboxContent" style="float: left; width: 558px; height: 308px;">
            <div id="cboxTitle" style="float: left; display: block;"></div>
            <div id="cboxCurrent" style="float: left; display: none;"></div>
            <button type="button" id="cboxPrevious" style="display: none;"></button>
            <button type="button" id="cboxNext" style="display: none;"></button>
            <button type="button" id="cboxSlideshow" style="display: none;"></button>
            <div id="cboxLoadingOverlay" style="float: left; display: none;"></div>
            <div id="cboxLoadingGraphic" style="float: left; display: none;"></div>
            <button type="button" id="cboxClose">close</button></div>
            <div id="cboxMiddleRight" style="float: left; height: 308px;"></div></div>
            <div style="clear: left;"><div id="cboxBottomLeft" style="float: left;"></div>
            <div id="cboxBottomCenter" style="float: left; width: 558px;"></div><div id="cboxBottomRight" style="float: left;"></div>
        </div></div><div style="position: absolute; width: 9999px; visibility: hidden; max-width: none; display: none;"></div>
    </div>
    </body></html>
